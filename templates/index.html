<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Product Catalog Engine</title>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center"
  >
    <div class="max-w-xl text-center px-6 py-12">
      <div
        class="inline-flex items-center gap-2 px-3 py-1 bg-indigo-50 text-indigo-700 rounded-full text-xs font-bold uppercase tracking-wider mb-6"
      >
        <span
          class="h-1.5 w-1.5 rounded-full bg-indigo-600 animate-pulse"
        ></span>
        Matrix Recommendation System Engine
      </div>

      <h1
        class="text-4xl sm:text-5xl font-black text-gray-900 tracking-tight leading-tight mb-4"
      >
        Discover Tech Products Tailored to You
      </h1>
      <p class="text-base text-gray-500 leading-relaxed max-w-md mx-auto mb-10">
        A real-time behavioral data system tracking actions, tags, and profiles
        to surface targeted inventory.
      </p>

      <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
        <a
          href="/login"
          class="w-full sm:w-auto px-8 py-3.5 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors shadow-sm shadow-indigo-100 text-center"
        >
          Sign In to Account
        </a>
        <a
          href="/register"
          class="w-full sm:w-auto px-8 py-3.5 text-sm font-semibold text-gray-900 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors shadow-sm text-center"
        >
          Create Account
        </a>
      </div>
    </div>
  </body>
</html>
