<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login - Tech Catalog</title>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="max-w-md w-full bg-white rounded-2xl border border-gray-100 p-8 shadow-sm"
    >
      <div class="text-center mb-8">
        <h1 class="text-2xl font-black text-gray-900 tracking-tight">
          Welcome Back
        </h1>
        <p class="text-sm text-gray-500 mt-1">
          Sign in to view your personalized recommendations.
        </p>
      </div>

      <form method="POST" class="space-y-5">
        <div>
          <label
            class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2"
            >Username</label
          >
          <input
            type="text"
            name="username"
            required
            placeholder="Enter your username"
            class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
          />
        </div>

        <div>
          <label
            class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2"
            >Password</label
          >
          <input
            type="password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
          />
        </div>

        <button
          type="submit"
          class="w-full py-3 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors cursor-pointer shadow-sm shadow-indigo-100 mt-2"
        >
          Sign In
        </button>
      </form>

      <div class="text-center mt-6 pt-6 border-t border-gray-50">
        <p class="text-sm text-gray-500">
          New to the platform?
          <a
            href="/register"
            class="text-indigo-600 font-semibold hover:underline"
            >Create an account</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
