<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Register - Tech Catalog</title>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="max-w-md w-full bg-white rounded-2xl border border-gray-100 p-8 shadow-sm"
    >
      <div class="text-center mb-8">
        <h1 class="text-2xl font-black text-gray-900 tracking-tight">
          Create Account
        </h1>
        <p class="text-sm text-gray-500 mt-1">
          Set up your profile for smarter engine metrics.
        </p>
      </div>

      <form method="POST" class="space-y-4">
        <div>
          <label
            class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5"
            >Username</label
          >
          <input
            type="text"
            name="username"
            required
            placeholder="Your unique profile name"
            class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
          />
        </div>

        <div>
          <label
            class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5"
            >Password</label
          >
          <input
            type="password"
            name="password"
            required
            placeholder="Create secure password"
            class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
          />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label
              class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5"
              >Age</label
            >
            <input
              type="number"
              name="age"
              required
              placeholder="Age"
              class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
            />
          </div>
          <div>
            <label
              class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5"
              >Gender</label
            >
            <select
              name="gender"
              class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all cursor-pointer"
            >
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>

        <div>
          <label
            class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-1.5"
            >Location</label
          >
          <input
            type="text"
            name="location"
            required
            placeholder="e.g. New York, IN"
            class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
          />
        </div>

        <button
          type="submit"
          class="w-full py-3 text-sm font-semibold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 transition-colors cursor-pointer shadow-sm shadow-indigo-100 mt-4"
        >
          Register
        </button>
      </form>

      <div class="text-center mt-6 pt-6 border-t border-gray-50">
        <p class="text-sm text-gray-500">
          Already registered?
          <a href="/login" class="text-indigo-600 font-semibold hover:underline"
            >Log in here</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
